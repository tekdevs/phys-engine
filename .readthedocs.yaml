version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # 1. Force installation directly into the virtual environment path
    install:
      - $READTHEDOCS_VIRTUALENV_PATH/bin/pip install --upgrade pip
      - $READTHEDOCS_VIRTUALENV_PATH/bin/pip install sphinx sphinx-rtd-theme
      - $READTHEDOCS_VIRTUALENV_PATH/bin/pip install -r docs/requirements.txt
    # 2. Run the build using that same virtual environment path
    build:
      html:
        - $READTHEDOCS_VIRTUALENV_PATH/bin/sphinx-build -b html docs/ $READTHEDOCS_OUTPUT/html
